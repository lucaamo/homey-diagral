<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 18px;
      color: #222;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }

    input {
      box-sizing: border-box;
      width: 100%;
      padding: 10px;
      border: 1px solid #d8d8d8;
      border-radius: 6px;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: 0;
      border-radius: 6px;
      background: #1987d8;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.55;
    }

    #status {
      min-height: 20px;
      margin-top: 12px;
      font-size: 14px;
      color: #666;
    }

    #status.error {
      color: #c62828;
    }
  </style>
</head>
<body>
  <label for="username" data-i18n="pair.username">Email</label>
  <input id="username" type="email" autocomplete="username">

  <label for="password" data-i18n="pair.password">Password</label>
  <input id="password" type="password" autocomplete="current-password">

  <label for="serialId" data-i18n="pair.serialId">Serial ID</label>
  <input id="serialId" type="text" autocomplete="off">

  <label for="pinCode" data-i18n="pair.pinCode">PIN code</label>
  <input id="pinCode" type="password" inputmode="numeric" autocomplete="off">

  <label for="webhookId">Webhook ID</label>
  <input id="webhookId" type="text" autocomplete="off">

  <label for="webhookSecret">Webhook secret</label>
  <input id="webhookSecret" type="password" autocomplete="off">

  <label for="pollInterval" data-i18n="pair.pollInterval">Polling interval (seconds)</label>
  <input id="pollInterval" type="number" min="60" max="3600" step="30" value="180">

  <button id="save" type="button">Ripara connessione</button>
  <div id="status"></div>

  <script>
    const $ = id => document.getElementById(id);

    function setStatus(message, isError = false) {
      $('status').textContent = message || '';
      $('status').className = isError ? 'error' : '';
    }

    Homey.ready(async () => {
      try {
        const settings = await Homey.emit('get_settings');
        $('username').value = settings.username || '';
        $('serialId').value = settings.serialId || '';
        $('webhookId').value = settings.webhookId || '';
        $('pollInterval').value = settings.pollInterval || 180;
      } catch (err) {
        setStatus(err.message || String(err), true);
      }
    });

    $('save').addEventListener('click', async () => {
      const save = $('save');
      save.disabled = true;
      setStatus('Verifica credenziali in corso...');

      try {
        await Homey.emit('repair_credentials', {
          username: $('username').value,
          password: $('password').value,
          serialId: $('serialId').value,
          pinCode: $('pinCode').value,
          webhookId: $('webhookId').value,
          webhookSecret: $('webhookSecret').value,
          pollInterval: Number($('pollInterval').value || 180),
        });
        setStatus('Connessione ripristinata.');
        Homey.done();
      } catch (err) {
        setStatus(err.message || String(err), true);
      } finally {
        save.disabled = false;
      }
    });
  </script>
</body>
</html>
